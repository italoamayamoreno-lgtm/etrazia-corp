<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brújula de Liderazgo — Panel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --navy:#0B1120; --navy-2:#131B2E; --copper:#B87333; --amber:#D97706;
    --ice:#F8FAFC; --graphite:#94A3B8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--navy); color:var(--ice); font-family:'Inter', sans-serif;
    min-height:100vh; padding:32px 24px;
  }
  h1,h2{font-family:'Montserrat', sans-serif; font-weight:900;}
  .wrap{ max-width:1600px; margin:0 auto; }
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:14px; }
  h1{ font-size:22px; }
  .eyebrow{ color:var(--copper); font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:700; margin-bottom:6px; }

  /* login gate */
  .gate{
    max-width:380px; margin:80px auto; text-align:center;
  }
  .gate input{
    width:100%; background:rgba(255,255,255,.03); border:1px solid rgba(148,163,184,.25);
    border-radius:10px; padding:13px 14px; color:var(--ice); font-size:14px; margin:18px 0;
  }
  .btn{
    background:var(--amber); color:var(--navy); font-family:'Montserrat',sans-serif; font-weight:800;
    font-size:13.5px; padding:12px 22px; border-radius:100px; border:none; cursor:pointer;
  }
  .btn.secondary{ background:transparent; border:1px solid rgba(148,163,184,.3); color:var(--ice); }
  .btn.danger{ background:transparent; border:1px solid rgba(248,113,113,.4); color:#f87171; }
  .btn.danger:hover{ background:rgba(248,113,113,.1); }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .error{ color:#f87171; font-size:12.5px; margin-top:10px; display:none; }
  .error.show{ display:block; }

  /* dashboard */
  #dashboard{ display:none; }
  .stats{ display:flex; gap:14px; margin-bottom:22px; flex-wrap:wrap; }
  .stat{ border:1px solid rgba(148,163,184,.2); border-radius:14px; padding:16px 20px; min-width:140px; background:rgba(255,255,255,.02); }
  .stat .k{ color:var(--graphite); font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
  .stat .v{ font-family:'Montserrat',sans-serif; font-weight:900; font-size:24px; }

  table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  thead th{
    text-align:left; color:var(--graphite); font-weight:600; text-transform:uppercase; font-size:10.5px;
    letter-spacing:.06em; padding:10px 10px; border-bottom:1px solid rgba(148,163,184,.2); white-space:nowrap;
  }
  tbody td{ padding:11px 10px; border-bottom:1px solid rgba(148,163,184,.08); }
  tbody tr:hover{ background:rgba(255,255,255,.02); }
  .badge{ padding:3px 9px; border-radius:100px; font-size:10.5px; font-weight:600; }
  .badge.completado{ background:rgba(217,119,6,.15); color:var(--amber); }
  .badge.registrado{ background:rgba(148,163,184,.15); color:var(--graphite); }
  .table-wrap{ overflow-x:auto; border:1px solid rgba(148,163,184,.15); border-radius:14px; }
  .loading, .empty{ color:var(--graphite); font-size:13px; padding:30px; text-align:center; }
</style>
</head>
<body>

<div class="wrap">

  <div class="gate" id="gate">
    <div class="eyebrow">Etrazia · Brújula de Liderazgo</div>
    <h1>Panel Admin</h1>
    <input type="password" id="admin-key" placeholder="Clave de administrador">
    <button class="btn" id="btn-login">Entrar</button>
    <div class="error" id="gate-error">Clave incorrecta o error de conexión.</div>
  </div>

  <div id="dashboard">
    <div class="header">
      <div>
        <div class="eyebrow">Etrazia · Brújula de Liderazgo</div>
        <h1>Leads registrados</h1>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn secondary" id="btn-refresh">Actualizar</button>
        <button class="btn danger" id="btn-delete-selected" disabled>Eliminar seleccionados (<span id="selected-count">0</span>)</button>
        <button class="btn danger" id="btn-delete-all">Eliminar todos</button>
        <button class="btn" id="btn-csv">Descargar CSV</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="table-wrap">
      <div class="loading" id="loading">Cargando...</div>
      <table id="leads-table" style="display:none;">
        <thead>
          <tr>
            <th style="width:34px;"><input type="checkbox" id="check-all"></th>
            <th>Fecha</th>
            <th>Nombres</th>
            <th>Apellidos</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Empresa</th>
            <th>Cargo</th>
            <th>Estado</th>
            <th>Arquetipo real</th>
            <th>Arquetipo ideal</th>
            <th>Informe</th>
          </tr>
        </thead>
        <tbody id="leads-body"></tbody>
      </table>
    </div>
  </div>

</div>

const ARCH_NAMES = {"D": "Director", "I": "Inspirador", "C": "Conector", "E": "Estratega"};
const ARCH_DEFS = {"D": "El Director lidera con decisión y control. Actúa rápido, asume el mando en momentos críticos y prioriza resultados claros por encima del consenso. Es la energía que mueve las cosas cuando hay que decidir ya.", "I": "El Inspirador lidera con energía y visión. Contagia entusiasmo, moviliza al equipo con su actitud y conecta a las personas con un propósito mayor. Es la energía que enciende la motivación colectiva.", "C": "El Conector lidera desde la cercanía. Prioriza la confianza, escucha antes de actuar y construye relaciones genuinas dentro del equipo. Es la energía que sostiene la cohesión humana del grupo.", "E": "El Estratega lidera con estructura y visión de largo plazo. Analiza antes de actuar, construye planes sólidos y busca la decisión mejor informada. Es la energía que ordena el camino hacia el objetivo."};
const ROADMAPS = {"D-I": ["En tu próxima reunión, abre preguntando “¿cómo se sienten con esto?” antes de dar la instrucción.", "Cuenta el “por qué” detrás de una decisión antes del “qué hacer”.", "Reconoce en público un logro de alguien de tu equipo esta semana.", "Comparte una anécdota personal que conecte con la visión del proyecto.", "Antes de cerrar una reunión, pregunta qué los entusiasma del siguiente paso."], "D-C": ["Antes de decidir algo grupal, pregunta primero la opinión de la persona más callada del equipo.", "Dedica 10 minutos de tu próxima reunión 1:1 a temas no laborales.", "Pregunta a alguien de tu equipo cómo está, sin agenda de trabajo detrás.", "Antes de dar una instrucción, pregunta cómo se sienten con la carga actual.", "Agradece explícitamente el esfuerzo de alguien, no solo el resultado."], "D-E": ["Antes de tu próxima decisión rápida, escribe 3 líneas con el “por qué” antes de actuar.", "Pide un dato o métrica extra antes de cerrar tu próxima decisión importante.", "Dedica 15 minutos a mapear alternativas antes de decidir algo grande esta semana.", "Documenta por escrito el razonamiento de tu próxima decisión clave.", "Antes de actuar, pregúntate qué podría salir mal y cómo lo prevendrías."], "I-D": ["En tu próxima decisión, da una fecha límite concreta en vez de “vamos viendo”.", "Cierra tu próxima reunión con una acción clara y un responsable, no solo con energía.", "Toma una decisión esta semana sin buscar validación de todo el equipo.", "Comunica un límite claro cuando algo no está funcionando.", "Antes de motivar, define primero el siguiente paso concreto."], "I-C": ["Antes de motivar al equipo, primero pregunta cómo está cada uno individualmente.", "Escucha una queja esta semana sin ofrecer solución de inmediato.", "Dedica una conversación esta semana solo a escuchar, sin hablar de resultados.", "Pregunta a alguien qué necesita de ti como líder, no qué necesitas tú de él.", "Antes de dar un mensaje motivador, valida cómo se siente realmente el equipo."], "I-E": ["Antes de tu próxima idea grande, escribe 2 riesgos posibles.", "Da seguimiento por escrito a un compromiso que hiciste verbalmente esta semana.", "Convierte una idea de esta semana en un plan con pasos y fechas.", "Antes de proponer algo nuevo, revisa los datos disponibles sobre el tema.", "Cierra el día documentando lo avanzado, no solo lo motivado."], "C-D": ["En tu próximo desacuerdo de equipo, toma tú la decisión final en vez de buscar consenso total.", "Comunica una decisión difícil esta semana sin suavizarla de más.", "Da una instrucción directa esta semana sin pedir opinión previa.", "Define un plazo concreto para una decisión pendiente y comunícalo.", "Practica decir “esto es lo que haremos” en vez de “¿qué les parece?”."], "C-I": ["Comparte una idea propia en la próxima reunión antes de preguntar la de los demás.", "Reconoce públicamente un logro del equipo esta semana.", "Da un mensaje de energía y visión al iniciar tu próxima reunión.", "Comparte con entusiasmo genuino un avance del proyecto esta semana.", "Invita a alguien a soñar en grande contigo sobre un objetivo futuro."], "C-E": ["Antes de tu próxima decisión de equipo, arma primero un mini plan con pasos y plazos.", "Prioriza tus tareas de la semana por impacto, no por quién te lo pidió primero.", "Define un criterio claro de éxito antes de iniciar tu próxima actividad.", "Documenta un proceso del equipo que hasta ahora se resuelve solo de palabra.", "Antes de reaccionar a una petición, evalúa el impacto real que tiene."], "E-D": ["Toma una decisión esta semana con la información que ya tienes, sin esperar el dato perfecto.", "Da una instrucción directa hoy sin explicar todo el razonamiento detrás.", "Cierra una decisión pendiente hoy mismo, aunque no esté 100% analizada.", "Practica decidir en el momento en una situación de bajo riesgo esta semana.", "Comunica una decisión con seguridad, sin abrirla a debate extendido."], "E-I": ["Comparte con el equipo el “para qué” de un proyecto actual, no solo el plan.", "Da una muestra de entusiasmo genuino en tu próxima reunión.", "Cuenta una historia o ejemplo que inspire antes de presentar datos.", "Reconoce el esfuerzo del equipo con una palabra sincera, no solo con métricas.", "Antes de tu próxima presentación, pregúntate qué quieres que sientan, no solo qué quieres que entiendan."], "E-C": ["Pregunta a un colaborador cómo está, sin agenda de trabajo detrás, esta semana.", "En tu próxima decisión, prioriza el impacto en las personas sobre la eficiencia del proceso.", "Dedica tiempo esta semana a conocer algo personal de alguien de tu equipo.", "Antes de optimizar un proceso, pregunta cómo lo vive quien lo ejecuta.", "Suaviza una comunicación técnica esta semana pensando en cómo la va a sentir el otro."]};
const COHERENCIA_ACCIONES = ["Identifica una situación reciente donde tu estilo funcionó muy bien — repítela conscientemente esta semana.", "Pregúntale a alguien de tu equipo qué es lo que más valora de tu forma de liderar.", "Pregúntale también qué le gustaría ver un poco más de ti como líder.", "Enseña o comparte con otro líder algo de tu estilo que te ha funcionado.", "Identifica una situación donde tu estilo podría ser un exceso, y practica moderarlo conscientemente."];
const NAME_TO_KEY = Object.fromEntries(Object.entries(ARCH_NAMES).map(([k, v]) => [v, k]));

let leadsCache = [];

document.getElementById('btn-login').addEventListener('click', login);
document.getElementById('admin-key').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});

async function login() {
  const key = document.getElementById('admin-key').value.trim();
  const errorEl = document.getElementById('gate-error');
  if (!key) return;

  try {
    const res = await fetch(WORKER_URL + '/leads', {
      headers: { 'X-Admin-Key': key },
    });
    if (!res.ok) throw new Error('unauthorized');
    const data = await res.json();
    leadsCache = data.leads;
    sessionStorage.setItem('brujula-admin-key', key);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderLeads(leadsCache);
  } catch (e) {
    errorEl.classList.add('show');
  }
}

async function fetchLeads() {
  const key = sessionStorage.getItem('brujula-admin-key');
  document.getElementById('loading').style.display = 'block';
  document.getElementById('leads-table').style.display = 'none';
  const res = await fetch(WORKER_URL + '/leads', { headers: { 'X-Admin-Key': key } });
  const data = await res.json();
  leadsCache = data.leads;
  renderLeads(leadsCache);
}

document.getElementById('btn-refresh').addEventListener('click', fetchLeads);
document.getElementById('btn-csv').addEventListener('click', downloadCSV);

function renderLeads(leads) {
  document.getElementById('loading').style.display = 'none';

  const total = leads.length;
  const completados = leads.filter(l => l.estado === 'completado').length;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="k">Registrados</div><div class="v">' + total + '</div></div>' +
    '<div class="stat"><div class="k">Completaron el juego</div><div class="v">' + completados + '</div></div>';

  const body = document.getElementById('leads-body');
  body.innerHTML = '';

  if (leads.length === 0) {
    document.getElementById('leads-table').style.display = 'none';
    body.innerHTML = '';
    const wrap = document.querySelector('.table-wrap');
    if (!document.getElementById('empty-msg')) {
      const div = document.createElement('div');
      div.id = 'empty-msg';
      div.className = 'empty';
      div.textContent = 'Todavía no hay registros.';
      wrap.appendChild(div);
    }
    return;
  }

  document.getElementById('leads-table').style.display = 'table';

  leads.forEach(l => {
    const tr = document.createElement('tr');
    const fecha = new Date(l.fecha).toLocaleString('es-PE', { dateStyle: 'short', timeStyle: 'short' });
    tr.innerHTML =
      '<td><input type="checkbox" class="row-check" data-id="' + l.id + '"></td>' +
      '<td>' + fecha + '</td>' +
      '<td>' + escapeHtml(l.nombres || '') + '</td>' +
      '<td>' + escapeHtml(l.apellidos || '') + '</td>' +
      '<td>' + escapeHtml(l.correo) + '</td>' +
      '<td>' + escapeHtml(l.telefonoCompleto || '—') + '</td>' +
      '<td>' + escapeHtml(l.empresa || '—') + '</td>' +
      '<td>' + escapeHtml(l.cargo || '—') + '</td>' +
      '<td><span class="badge ' + l.estado + '">' + l.estado + '</span></td>' +
      '<td>' + (l.arquetipoReal || '—') + '</td>' +
      '<td>' + (l.arquetipoIdeal || '—') + '</td>' +
      '<td>' + (l.estado === 'completado'
        ? '<button class="btn secondary" style="padding:6px 12px; font-size:11px;" onclick="downloadLeadReport(\'' + l.id + '\')">📄 PDF</button>'
        : '<span style="color:var(--graphite); font-size:11px;">—</span>') + '</td>';
    body.appendChild(tr);
  });

  document.getElementById('check-all').checked = false;
  updateSelectedCount();
  document.querySelectorAll('.row-check').forEach(cb => {
    cb.addEventListener('change', updateSelectedCount);
  });
}

function updateSelectedCount() {
  const checked = document.querySelectorAll('.row-check:checked');
  document.getElementById('selected-count').textContent = checked.length;
  document.getElementById('btn-delete-selected').disabled = checked.length === 0;
}

document.getElementById('check-all').addEventListener('change', (e) => {
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = e.target.checked; });
  updateSelectedCount();
});

document.getElementById('btn-delete-selected').addEventListener('click', async () => {
  const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.dataset.id);
  if (ids.length === 0) return;
  if (!confirm('¿Eliminar ' + ids.length + ' registro(s) seleccionado(s)? Esta acción no se puede deshacer.')) return;

  const key = sessionStorage.getItem('brujula-admin-key');
  await fetch(WORKER_URL + '/leads', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
    body: JSON.stringify({ ids }),
  });
  fetchLeads();
});

document.getElementById('btn-delete-all').addEventListener('click', async () => {
  if (!confirm('¿Eliminar TODOS los registros? Esta acción no se puede deshacer.')) return;
  if (!confirm('Confirma una vez más: se borrará toda la data de leads registrados hasta ahora.')) return;

  const key = sessionStorage.getItem('brujula-admin-key');
  await fetch(WORKER_URL + '/leads', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
    body: JSON.stringify({ all: true }),
  });
  fetchLeads();
});

function downloadLeadReport(id) {
  const lead = leadsCache.find(l => l.id === id);
  if (!lead || !lead.arquetipoReal) return;

  const realKey = NAME_TO_KEY[lead.arquetipoReal];
  const idealKey = NAME_TO_KEY[lead.arquetipoIdeal];
  const nombreCompleto = ((lead.nombres || '') + ' ' + (lead.apellidos || '')).trim();

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageW = 595, pageH = 842;
  const navy = [11, 17, 32];
  const ice = [248, 250, 252];
  const graphite = [148, 163, 184];
  const amber = [217, 119, 6];
  const copper = [184, 115, 51];

  doc.setFillColor(...navy);
  doc.rect(0, 0, pageW, pageH, 'F');

  let y = 56;
  try {
    doc.addImage(LOGO_SRC, 'PNG', 46, y, 130, 32);
  } catch (e) { /* si falla la imagen, seguimos sin logo */ }
  y += 60;

  doc.setTextColor(...copper);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.text('BRÚJULA DE LIDERAZGO · INFORME PERSONAL', 46, y);
  y += 26;

  if (nombreCompleto) {
    doc.setTextColor(...ice);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.text(nombreCompleto, 46, y);
    y += 34;
  }

  function drawDefBlock(label, archKey) {
    doc.setTextColor(...amber);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text(label + ': ' + ARCH_NAMES[archKey], 46, y);
    y += 16;
    doc.setTextColor(...graphite);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    const lines = doc.splitTextToSize(ARCH_DEFS[archKey], pageW - 92);
    doc.text(lines, 46, y);
    y += lines.length * 13 + 20;
  }

  drawDefBlock('Hoy eres', realKey);
  if (idealKey !== realKey) {
    drawDefBlock('Quieres ser', idealKey);
  }

  y += 6;
  doc.setTextColor(...ice);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.text('Hoja de ruta', 46, y);
  y += 22;

  const acciones = realKey === idealKey ? COHERENCIA_ACCIONES : ROADMAPS[realKey + '-' + idealKey];
  acciones.forEach((accion, i) => {
    doc.setTextColor(...amber);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text('ACCIÓN 0' + (i + 1), 46, y);
    y += 13;
    doc.setTextColor(...ice);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10.5);
    const lines = doc.splitTextToSize(accion, pageW - 92);
    doc.text(lines, 46, y);
    y += lines.length * 13 + 14;
  });

  doc.setTextColor(...graphite);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.text('Etrazia · Brújula de Liderazgo · etrazia.com', 46, pageH - 36);

  const fileName = 'brujula-liderazgo' + (nombreCompleto ? '-' + nombreCompleto.replace(/\s+/g, '-').toLowerCase() : '') + '.pdf';
  doc.save(fileName);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function downloadCSV() {
  const headers = ['Fecha', 'Nombres', 'Apellidos', 'Correo', 'Teléfono', 'Empresa', 'Cargo', 'Consentimiento', 'Estado', 'Arquetipo real', 'Arquetipo ideal'];
  const rows = leadsCache.map(l => [
    l.fecha, l.nombres || '', l.apellidos || '', l.correo, l.telefonoCompleto || '',
    l.empresa || '', l.cargo || '', l.consentimiento ? 'Sí' : 'No',
    l.estado, l.arquetipoReal || '', l.arquetipoIdeal || ''
  ]);

  let csv = headers.join(',') + '\\n';
  rows.forEach(row => {
    csv += row.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',') + '\\n';
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'brujula-liderazgo-leads-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// Si ya había sesión iniciada en este navegador, entra directo
const savedKey = sessionStorage.getItem('brujula-admin-key');
if (savedKey) {
  document.getElementById('admin-key').value = savedKey;
  login();
}
</script>
</body>
</html>
